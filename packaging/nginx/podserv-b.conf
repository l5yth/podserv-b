# nginx reverse proxy for podserv-b
#
# Setup:
#   1. Copy to /etc/nginx/sites-available/podserv-b.conf
#   2. Replace YOUR_DOMAIN with your actual domain
#   3. Run: certbot --nginx -d YOUR_DOMAIN
#   4. ln -s /etc/nginx/sites-available/podserv-b.conf /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # certbot will add the HTTPS redirect here
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN;

    # certbot will populate these after running
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:8447;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow byte-range requests to pass through for audio seeking
        proxy_set_header   Range             $http_range;
        proxy_set_header   If-Range          $http_if_range;
        proxy_no_cache     1;
    }
}
