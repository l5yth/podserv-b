name: Linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pkgbuild:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: pacman -Syu --noconfirm --needed base-devel git sudo rust

      - name: Build and install AUR package
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "${GITHUB_WORKSPACE}"
          su - builder -c "cd '${GITHUB_WORKSPACE}/packaging/archlinux' && sed -i \"s|^source=.*$|source=(\\\"podserv-b::git+https://github.com/${GITHUB_REPOSITORY}.git#commit=${GITHUB_SHA}\\\")|\" PKGBUILD && makepkg --syncdeps --noconfirm --cleanbuild --clean --install"

  ebuild:
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap Gentoo repo and profile
        run: |
          emerge-webrsync --quiet

          if [ ! -L /etc/portage/make.profile ]; then
            profile_path="$(find /var/db/repos/gentoo/profiles/default/linux/amd64 -type f -name make.defaults | head -n1)"
            if [ -n "${profile_path}" ]; then
              ln -snf "$(dirname "${profile_path}")" /etc/portage/make.profile
            fi
          fi

      - name: Configure local overlay
        run: |
          mkdir -p /var/db/repos/localrepo/{metadata,profiles,media-sound/podserv-b}
          cp "${GITHUB_WORKSPACE}/packaging/gentoo/media-sound/podserv-b/podserv-b-9999.ebuild" /var/db/repos/localrepo/media-sound/podserv-b/
          cp "${GITHUB_WORKSPACE}/packaging/gentoo/media-sound/podserv-b/metadata.xml" /var/db/repos/localrepo/media-sound/podserv-b/
          printf "localrepo\n" > /var/db/repos/localrepo/profiles/repo_name
          cat > /var/db/repos/localrepo/metadata/layout.conf <<'EOF'
          masters = gentoo
          auto-sync = no
          EOF
          mkdir -p /etc/portage/repos.conf
          cat > /etc/portage/repos.conf/localrepo.conf <<'EOF'
          [localrepo]
          location = /var/db/repos/localrepo
          masters = gentoo
          auto-sync = no
          EOF
          mkdir -p /etc/portage/package.accept_keywords
          printf "=media-sound/podserv-b-9999 **\n" > /etc/portage/package.accept_keywords/localrepo

      - name: Install build dependencies
        run: |
          FEATURES="-ipc-sandbox -network-sandbox -pid-sandbox -mount-sandbox -usersandbox -userpriv" \
            emerge --ask=n --oneshot dev-lang/rust-bin dev-vcs/git

      - name: Build and test ebuild
        run: |
          export FEATURES="-ipc-sandbox -network-sandbox -pid-sandbox -mount-sandbox -usersandbox -userpriv"
          EBUILD=/var/db/repos/localrepo/media-sound/podserv-b/podserv-b-9999.ebuild
          ebuild "${EBUILD}" manifest
          ebuild "${EBUILD}" clean fetch unpack configure compile test install

  nix:
    runs-on: ubuntu-latest
    container:
      image: nixos/nix:latest

    steps:
      - name: Enable flakes
        run: echo "experimental-features = nix-command flakes" >> /etc/nix/nix.conf

      - name: Checkout
        run: |
          git clone "https://github.com/${{ github.repository }}.git" /build
          git -C /build checkout "${{ github.sha }}"

      - name: Build
        working-directory: /build
        run: nix build --no-update-lock-file
